<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Liquide - Portail Concentrateur</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CONFIGURATION DES COULEURS ET THÈMES */
        :root {
            --bg: #e0e5ec;
            --light-shadow: #ffffff;
            --dark-shadow: #a3b1c6;
            --text-main: #2c3e50;
            --text-data: #44476a;
            --accent: #007BFF;
            --logo-red: #d92323;
        }

        [data-theme="dark"] {
            --bg: #1d1f23;
            --light-shadow: #2b2e34;
            --dark-shadow: #0f1013;
            --text-main: #c9d1d9;
            --text-data: #e1e8ed;
            --accent: #4dabff;
            --logo-red: #ff4d4d;
        }

        /* MISE EN PAGE GÉNÉRALE */
        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
            overflow: hidden;
            position: relative;
        }

        /* ARRIÈRE-PLAN ANIMÉ (AURA) */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
        }
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(0, 123, 255, 0.1);
            animation: move 20s infinite alternate;
        }
        .blob.two { background: rgba(0, 255, 128, 0.05); left: 50%; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* BOUTON MODE SOMBRE */
        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--dark-shadow), -6px -6px 12px var(--light-shadow);
            font-size: 20px;
            border: none;
            color: var(--text-main);
            z-index: 10;
        }

        /* CARTE PRINCIPALE (STYLE IMAGE) */
        .card {
            background: rgba(224, 229, 236, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px var(--dark-shadow), -20px -20px 60px var(--light-shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.1s ease-out;
            animation: fadeInUp 0.8s ease-out;
            perspective: 1000px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO AIR LIQUIDE */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 26px;
            color: var(--logo-red);
        }
        .logo-symbol {
            margin-right: 12px;
            width: 30px;
            height: 30px;
            border: 4px solid #0055a4;
            border-radius: 50% 50% 0 50%;
            display: inline-block;
        }

        h1 {
            color: var(--text-main);
            font-size: 1.4rem;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* CHAMPS DE DONNÉES NEUMORPHIQUES */
        .data-group {
            margin-bottom: 22px;
            text-align: left;
        }
        .label {
            display: block;
            color: #a3b1c6;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-left: 12px;
            letter-spacing: 0.5px;
        }
        .data-box {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            background-color: var(--bg);
            box-shadow: inset 6px 6px 12px var(--dark-shadow), inset -6px -6px 12px var(--light-shadow);
            color: var(--text-data);
            font-size: 16px;
            font-weight: 600;
            box-sizing: border-box;
        }

        /* BOUTON DE TÉLÉCHARGEMENT */
        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 35px;
            padding: 22px;
            background: var(--bg);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border-radius: 20px;
            box-shadow: 10px 10px 20px var(--dark-shadow), -10px -10px 20px var(--light-shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .btn-download:hover {
            color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.2);
        }

        .btn-download:active {
            box-shadow: inset 6px 6px 12px var(--dark-shadow), inset -6px -6px 12px var(--light-shadow);
            transform: scale(0.97);
        }

        .icon { margin-right: 12px; font-size: 1.3rem; }
    </style>
</head>
<body data-theme="light">

    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob two"></div>
    </div>

    <button class="theme-switch" onclick="toggleTheme()" title="Changer de mode">🌓</button>

    <div class="card" id="card">
        <div class="logo">
            <div class="logo-symbol"></div>
            Air Liquide
        </div>
        
        <h1>Concentrateur d'Oxygène</h1>

        <div class="data-group">
            <span class="label">Numéro de Série</span>
            <div class="data-box" id="serialText">OXY-12347</div>
        </div>

        <div class="data-group">
            <span class="label">Date d'installation</span>
            <div class="data-box">10/04/2028</div>
        </div>

        <div class="data-group">
            <span class="label">Prochaine Maintenance</span>
            <div class="data-box">2027-04-11T23:00:00.000Z</div>
        </div>

        <button id="downloadLink" class="btn-download">
            <span class="icon">📄</span> Télécharger le Manuel
        </button>
    </div>

    <script>
        // 1. LE BOUTON INTELLIGENT (Connexion avec l'API Google Script)
        const downloadBtn = document.getElementById('downloadLink');
        const serial = document.getElementById('serialText').innerText.trim();
        
        downloadBtn.addEventListener('click', function(event) {
            event.preventDefault(); // Empêche le comportement par défaut

            // Création de l'URL avec le bon paramètre "?sn="
            const scriptURL = `https://script.google.com/macros/s/AKfycbzmrvqe6z6NlzXmPgXS1HdFMwSm-cwScS2W7IcsQXzrvqYv5OTiCP6pdzkvZxWD3U0/exec?sn=${serial}`;
            
            // Effet visuel pendant le chargement
            const originalText = this.innerHTML;
            this.innerHTML = `<span class="icon">⏳</span> Recherche en cours...`;
            this.style.pointerEvents = "none"; // Empêche le double-clic

            // Requête vers le fichier Google Sheet
            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    // Remise à zéro du bouton une fois la réponse reçue
                    this.innerHTML = originalText;
                    this.style.pointerEvents = "auto";

                    if (data.error) {
                        alert("⚠️ Erreur : " + data.error);
                    } else if (data.manual_link) {
                        // Ouvre le lien du manuel dans un nouvel onglet !
                        window.open(data.manual_link, '_blank');
                    } else {
                        alert("⚠️ Aucun manuel n'est enregistré pour cette machine.");
                    }
                })
                .catch(error => {
                    this.innerHTML = originalText;
                    this.style.pointerEvents = "auto";
                    alert("⚠️ Erreur de connexion avec le serveur.");
                });
        });

        // 2. GESTION DU THÈME SOMBRE
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        // 3. EFFET 3D (TILT)
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
