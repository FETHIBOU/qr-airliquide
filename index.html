<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel Digital Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e5ec;
            --light-shadow: #ffffff;
            --dark-shadow: #a3b1c6;
            --accent: #007BFF;
            --text: #31344b;
        }

        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* AMÉLIORATION 1 : ARRIÈRE-PLAN ANIMÉ */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(0, 123, 255, 0.2);
            animation: move 20s infinite alternate;
        }

        .blob.two { background: rgba(0, 255, 128, 0.1); left: 50%; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* AMÉLIORATION 2 : CARTE GLASSMORPHIC-NEUMORPHIC */
        .card {
            background: rgba(224, 229, 236, 0.7); /* Translucide */
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px var(--dark-shadow), -20px -20px 60px var(--light-shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h1 { color: var(--text); font-weight: 600; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border: none;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--dark-shadow), inset -6px -6px 12px var(--light-shadow);
            outline: none;
            color: var(--text);
            box-sizing: border-box;
        }

        /* AMÉLIORATION 3 : BOUTON AVEC ÉCLAT (GLOW) */
        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-top: 10px;
            background: var(--bg);
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 8px 8px 15px var(--dark-shadow), -8px -8px 15px var(--light-shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-download:hover {
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
            transform: translateY(-5px);
        }

        .btn-download:active {
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            transform: scale(0.95);
        }

        .badge {
            font-size: 10px;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            position: absolute;
            top: -10px;
            right: 10px;
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob two"></div>
    </div>

    <div class="card">
        <h1>Guide Expert</h1>
        
        <input type="text" placeholder="Prénom">
        <input type="email" placeholder="Email">

        <a href="https://script.google.com/macros/s/AKfycbzmrvqe6z6NlzXmPgXS1HdFMwSm-cwScS2W7IcsQXzrvqYv5OTiCP6pdzkvZxWD3U0/exec" target="_blank" class="btn-download">
            <span class="badge">NOUVEAU</span>
            📥 TÉLÉCHARGER LE MANUEL
        </a>
    </div>

</body>
</html>
