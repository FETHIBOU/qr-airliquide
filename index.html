<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalAire & Air Liquide - Suivi Équipement</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e5ec;
            --light-shadow: #ffffff;
            --dark-shadow: #a3b1c6;
            --text-main: #2c3e50;
            --text-data: #44476a;
            --accent: #007BFF;
            --danger: #d92323;
            --success: #28a745;
        }

        [data-theme="dark"] {
            --bg: #1d1f23;
            --light-shadow: #2b2e34;
            --dark-shadow: #0f1013;
            --text-main: #c9d1d9;
            --text-data: #e1e8ed;
            --accent: #4dabff;
            --danger: #ff4d4d;
            --success: #00e676;
        }

        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
            overflow-x: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* BOUTON MODE SOMBRE */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--dark-shadow), -6px -6px 12px var(--light-shadow);
            font-size: 20px;
            border: none;
            color: var(--text-main);
            z-index: 100;
        }

        /* CARTE PRINCIPALE */
        .card {
            background: rgba(224, 229, 236, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px var(--dark-shadow), -20px -20px 60px var(--light-shadow);
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* EN-TÊTE : LOGOS */
        .logos-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo-al {
            font-weight: 700;
            font-size: 20px;
            color: var(--danger);
            display: flex;
            align-items: center;
        }

        .logo-symbol {
            margin-right: 8px;
            width: 20px;
            height: 20px;
            border: 3px solid #0055a4;
            border-radius: 50% 50% 0 50%;
        }

        .divider {
            width: 2px;
            height: 30px;
            background-color: var(--dark-shadow);
            opacity: 0.5;
        }

        .logo-vitalaire {
            height: 25px; /* Ajustement de la taille du logo SVG */
        }
        
        /* Ajustement du logo VitalAire en mode sombre (le rend blanc) */
        [data-theme="dark"] .logo-vitalaire {
            filter: brightness(0) invert(1);
        }

        /* EN-TÊTE : TITRE ET STATUT */
        .header-title {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-main);
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            background: var(--bg);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            color: var(--text-main);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: #888; /* Gris par défaut (chargement) */
            box-shadow: 0 0 8px currentColor;
        }

        /* GRILLE DE DONNÉES (2 Colonnes) */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .data-group { text-align: left; }
        .data-group.full-width { grid-column: 1 / -1; }

        .label {
            display: block;
            color: #a3b1c6;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-left: 12px;
        }

        .data-box {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            background-color: var(--bg);
            box-shadow: inset 6px 6px 12px var(--dark-shadow), inset -6px -6px 12px var(--light-shadow);
            color: var(--text-data);
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            min-height: 50px;
        }

        /* BOUTONS D'ACTION */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: var(--bg);
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            border-radius: 18px;
            box-shadow: 8px 8px 16px var(--dark-shadow), -8px -8px 16px var(--light-shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary { color: var(--accent); }
        .btn-danger { color: var(--danger); }

        .btn:hover { transform: translateY(-3px); }
        .btn-primary:hover { box-shadow: 0 8px 20px rgba(0, 123, 255, 0.2); }
        .btn-danger:hover { box-shadow: 0 8px 20px rgba(217, 35, 35, 0.2); }

        .btn:active {
            box-shadow: inset 6px 6px 12px var(--dark-shadow), inset -6px -6px 12px var(--light-shadow);
            transform: scale(0.98);
        }

        .icon { margin-right: 10px; font-size: 1.2rem; }
    </style>
</head>
<body data-theme="light">

    <button class="theme-switch" onclick="toggleTheme()">🌓</button>

    <div class="card" id="card">
        
        <div class="logos-container">
            <div class="logo-al"><div class="logo-symbol"></div> Air Liquide</div>
            <div class="divider"></div>
            <img src="https://fr.vitalaire.com/sites/vitalaire_fr/files/2025-03/logo-vitalaire_0.svg" alt="VitalAire" class="logo-vitalaire">
        </div>
        
        <div class="header-title">
            <h1>Concentrateur d'Oxygène</h1>
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connexion en cours...</span>
            </div>
        </div>

        <div class="data-grid">
            <div class="data-group full-width">
                <span class="label">Numéro de Série</span>
                <div class="data-box" id="serialText">OXY-12347</div>
            </div>

            <div class="data-group">
                <span class="label">Modèle</span>
                <div class="data-box" id="modelText">Chargement...</div>
            </div>
            <div class="data-group">
                <span class="label">Débit configuré</span>
                <div class="data-box" id="flowText">Chargement...</div>
            </div>

            <div class="data-group full-width">
                <span class="label">Date d'installation</span>
                <div class="data-box" id="installText">Chargement...</div>
            </div>

            <div class="data-group full-width">
                <span class="label">Prochaine Maintenance</span>
                <div class="data-box" id="maintenanceText">Chargement...</div>
            </div>
        </div>

        <div class="actions">
            <button id="downloadLink" class="btn btn-primary" style="opacity: 0.5; pointer-events: none;">
                <span class="icon">⏳</span> Recherche du Manuel...
            </button>

            <button id="supportLink" class="btn btn-danger">
                <span class="icon">🚨</span> Signaler un incident
            </button>
        </div>
    </div>

   <script>
        // --- 1. CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmrvqe6z6NlzXmPgXS1HdFMwSm-cwScS2W7IcsQXzrvqYv5OTiCP6pdzkvZxWD3U0/exec";
        const serialNumber = document.getElementById('serialText').innerText.trim();
        
        let manualUrl = ""; 
        let supportEmail = "support@vitalaire.fr"; // E-mail par défaut au cas où la case est vide dans le sheet

        // --- 2. CHARGEMENT AUTOMATIQUE DES DONNÉES ---
        window.onload = function() {
            fetch(`${SCRIPT_URL}?sn=${serialNumber}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('statusText').innerText = "Appareil Inconnu";
                        document.getElementById('statusDot').style.backgroundColor = "gray";
                        return;
                    }

                    // Remplissage des cases
                    document.getElementById('installText').innerText = data.install_date || "Non définie";
                    document.getElementById('maintenanceText').innerText = data.maintenance_date || "Non définie";
                    document.getElementById('modelText').innerText = data.model || "Standard";
                    document.getElementById('flowText').innerText = data.flow || "-";
                    
                    // NOUVEAU : Récupération de l'e-mail depuis Google Sheet
                    if (data.support_email) {
                        supportEmail = data.support_email;
                    }
                    
                    // Calcul du Statut (En règle ou Maintenance dépassée)
                    checkStatus(data.maintenance_date);

                    // Activation du bouton PDF
                    if (data.manual_link) {
                        manualUrl = data.manual_link;
                        const btn = document.getElementById('downloadLink');
                        btn.style.opacity = "1";
                        btn.style.pointerEvents = "auto";
                        btn.innerHTML = `<span class="icon">📄</span> Télécharger le Manuel`;
                    } else {
                        document.getElementById('downloadLink').innerHTML = `<span class="icon">❌</span> Aucun manuel dispo`;
                    }
                })
                .catch(error => {
                    document.getElementById('statusText').innerText = "Erreur réseau";
                });
        };

        // --- 3. GESTION DU STATUT VISUEL (Pastille) ---
        function checkStatus(maintenanceDateStr) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if(!maintenanceDateStr) {
                statusText.innerText = "Données incomplètes";
                return;
            }

            const maintDate = new Date(maintenanceDateStr);
            const today = new Date();

            if (maintDate < today) {
                statusDot.style.backgroundColor = "var(--danger)";
                statusDot.style.boxShadow = "0 0 10px var(--danger)";
                statusText.innerText = "MAINTENANCE REQUISE";
                statusText.style.color = "var(--danger)";
            } else {
                statusDot.style.backgroundColor = "var(--success)";
                statusDot.style.boxShadow = "0 0 10px var(--success)";
                statusText.innerText = "EN SERVICE (CONFORME)";
                statusText.style.color = "var(--success)";
            }
        }

        // --- 4. ACTIONS DES BOUTONS ---
        document.getElementById('downloadLink').addEventListener('click', function() {
            if(manualUrl) window.open(manualUrl, '_blank');
        });

        // NOUVEAU : Le bouton utilise maintenant l'e-mail dynamique !
        document.getElementById('supportLink').addEventListener('click', function() {
            const subject = encodeURIComponent(`Assistance requise - Machine ${serialNumber}`);
            const body = encodeURIComponent(`Bonjour,\n\nNous rencontrons un problème avec le concentrateur d'oxygène (SN: ${serialNumber}).\n\nMerci de nous recontacter.\n\nCordialement,`);
            
            // Ouvre la messagerie avec la bonne adresse récupérée du Google Sheet
            window.location.href = `mailto:${supportEmail}?subject=${subject}&body=${body}`;
        });

        // --- 5. THEME SOMBRE ---
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }
    </script>
    </script>
</body>
</html>
