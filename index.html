<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalAire & Air Liquide - Management Portal</title>
    <!-- Polices pour le Français/Anglais et l'Arabe -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABLES DE DESIGN (NEUMORPHISM) --- */
        :root {
            --bg: #e0e5ec;
            --light-shadow: #ffffff;
            --dark-shadow: #a3b1c6;
            --text-main: #2c3e50;
            --text-data: #44476a;
            --accent: #007BFF;
            --danger: #d92323;
            --success: #28a745;
            --warning: #f39c12;
        }

        [data-theme="dark"] {
            --bg: #1d1f23;
            --light-shadow: #2b2e34;
            --dark-shadow: #0f1013;
            --text-main: #c9d1d9;
            --text-data: #e1e8ed;
            --accent: #4dabff;
            --danger: #ff4d4d;
            --success: #00e676;
            --warning: #f1c40f;
        }

        /* --- MISE EN PAGE --- */
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        body[dir="rtl"] { font-family: 'Cairo', sans-serif; }

        /* --- BARRE DE CONTRÔLES HAUT --- */
        .controls {
            position: fixed;
            top: 15px;
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .lang-selector select, .theme-switch {
            background: var(--bg);
            color: var(--text-main);
            border: none;
            padding: 10px 15px;
            border-radius: 15px;
            box-shadow: 4px 4px 8px var(--dark-shadow), -4px -4px 8px var(--light-shadow);
            font-weight: 600;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        /* --- CARTE PRINCIPALE --- */
        .card {
            background: rgba(224, 229, 236, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            margin-top: 60px;
            box-shadow: 20px 20px 60px var(--dark-shadow), -20px -20px 60px var(--light-shadow);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        /* Logos */
        .logos-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .logo-al { font-weight: 700; font-size: 18px; color: var(--danger); }
        .logo-va { height: 22px; }
        [data-theme="dark"] .logo-va { filter: brightness(0) invert(1); }

        /* Titres */
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: 20px; }

        /* Barre de Recherche */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-container input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 12px;
            border: none;
            background: var(--bg);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            color: var(--text-main);
            font-weight: 600;
            outline: none;
        }

        /* Statut Badge */
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin: 0 auto 30px auto;
            width: max-content;
            background: var(--bg);
            box-shadow: inset 3px 3px 6px var(--dark-shadow), inset -3px -3px 6px var(--light-shadow);
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin: 0 8px; background-color: gray; }

        /* Grille de Données */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full-width { grid-column: 1 / -1; }
        .label { font-size: 11px; font-weight: 700; color: #a3b1c6; text-transform: uppercase; margin-bottom: 5px; display: block; padding: 0 10px; }
        .data-box {
            padding: 12px 15px;
            border-radius: 12px;
            background: var(--bg);
            box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
            font-weight: 600;
            font-size: 14px;
            min-height: 45px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* --- ANIMATION SKELETON --- */
        .skeleton {
            background: linear-gradient(90deg, var(--bg) 25%, var(--dark-shadow) 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: loadingPulse 1.5s infinite;
            color: transparent !important;
        }
        @keyframes loadingPulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- BOUTONS --- */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn {
            padding: 15px;
            border-radius: 15px;
            background: var(--bg);
            border: none;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--dark-shadow), -6px -6px 12px var(--light-shadow);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-family: inherit;
        }

        .btn:active { box-shadow: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow); }
        .btn-blue { color: var(--accent); }
        .btn-red { color: var(--danger); }
        .btn-warning { color: var(--warning); }
        .btn-full { grid-column: 1 / -1; }

        /* --- ZONE TECHNICIEN --- */
        .tech-panel {
            display: none;
            margin-top: 25px;
            border-top: 2px dashed var(--dark-shadow);
            padding-top: 20px;
        }

        .history-item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: var(--bg);
            box-shadow: inset 2px 2px 5px var(--dark-shadow);
            font-size: 12px;
            color: var(--text-data);
        }

        /* --- MODALES --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: var(--bg);
            box-shadow: inset 3px 3px 6px var(--dark-shadow), inset -3px -3px 6px var(--light-shadow);
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
        }

        .modal iframe { width: 100%; height: 250px; border: none; border-radius: 15px; margin-bottom: 15px; }

        /* --- IMPRESSION PDF --- */
        @media print {
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: 2px solid #000; padding: 20px; margin: 0; width: 100%; max-width: 100%; }
            .controls, .actions, .theme-switch, .tech-lock-btn, .search-container, .btn { display: none !important; }
            .tech-panel { display: block !important; border-top: 1px solid #000; }
        }
    </style>
</head>
<body data-theme="light">

    <!-- CONTRÔLES HAUT -->
    <div class="controls no-print">
        <div class="lang-selector">
            <select id="langSwitch" onchange="changeLanguage(this.value)">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇬🇧 EN</option>
                <option value="ar">🇹🇳 AR</option>
            </select>
        </div>
        <button class="theme-switch" onclick="toggleTheme()">🌓</button>
    </div>

    <!-- CARTE PRINCIPALE -->
    <div class="card" id="mainCard">
        <div class="logos-container">
            <div class="logo-al">Air Liquide</div>
            <img src="https://fr.vitalaire.com/sites/vitalaire_fr/files/2025-03/logo-vitalaire_0.svg" class="logo-va">
        </div>
        
        <h1 data-i18n="title">Concentrateur d'Oxygène</h1>

        <!-- RECHERCHE MANUELLE -->
        <div class="search-container no-print">
            <input type="text" id="searchInput" placeholder="Saisir SN (ex: OXY-12347)">
            <button class="btn btn-blue" style="width: 50px;" onclick="manualSearch()">🔍</button>
        </div>

        <!-- STATUS -->
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText" data-i18n="loading">Recherche...</span>
        </div>

        <!-- GRILLE DE DONNÉES -->
        <div class="data-grid">
            <div class="full-width">
                <span class="label" data-i18n="sn">Numéro de Série</span>
                <div class="data-box" id="snDisp">---</div>
            </div>
            <div>
                <span class="label" data-i18n="model">Modèle</span>
                <div class="data-box skeleton" id="modelDisp">...</div>
            </div>
            <div>
                <span class="label" data-i18n="flow">Débit configuré</span>
                <div class="data-box skeleton" id="flowDisp">...</div>
            </div>
            <div class="full-width">
                <span class="label" data-i18n="install">Date d'installation</span>
                <div class="data-box skeleton" id="installDisp">...</div>
            </div>
            <div class="full-width">
                <span class="label" data-i18n="maint">Prochaine Maintenance</span>
                <div class="data-box skeleton" id="maintDisp">...</div>
            </div>
        </div>

        <!-- ACTIONS UTILISATEUR -->
        <div class="actions no-print">
            <button class="btn btn-blue" onclick="openManual()"><span data-i18n="btnDoc">Manuel PDF</span></button>
            <button class="btn" onclick="openVideo()"><span data-i18n="btnVideo">Tutoriel Vidéo</span></button>
            <button class="btn btn-full btn-red" onclick="openModal('reportModal')"><span data-i18n="btnReport">Signaler un incident</span></button>
        </div>

        <br class="no-print">
        
        <!-- ACCÈS SÉCURISÉ TECHNICIEN -->
        <button class="btn btn-full btn-warning tech-lock-btn no-print" onclick="unlockTech()">🔒 Accès Technicien</button>

        <!-- ZONE TECHNICIEN -->
        <div class="tech-panel" id="techZone">
            <h3 style="font-size: 14px; margin-bottom: 15px;" data-i18n="history">Historique & Administration</h3>
            <div id="historyList"></div>
            
            <div class="actions no-print">
                <button class="btn btn-blue" onclick="exportInventory()">📊 Exporter CSV</button>
                <button class="btn" onclick="bulkQR()">🖼️ Planche QR</button>
                <button class="btn btn-full" onclick="window.print()">🖨️ Générer Fiche PDF</button>
            </div>
        </div>
    </div>

    <!-- MODAL VIDÉO -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
            <button class="btn btn-full" onclick="closeModal('videoModal')" data-i18n="close">Fermer</button>
        </div>
    </div>

    <!-- MODAL SIGNALEMENT -->
    <div class="modal" id="reportModal">
        <div class="modal-content">
            <h2 data-i18n="formTitle">Détail du problème</h2>
            <input type="email" id="repEmail" placeholder="Votre Email" required>
            <textarea id="repMsg" rows="4" placeholder="Description de la panne..."></textarea>
            <div class="actions">
                <button class="btn" onclick="closeModal('reportModal')" data-i18n="cancel">Annuler</button>
                <button class="btn btn-blue" onclick="submitReport()" data-i18n="send">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmrvqe6z6NlzXmPgXS1HdFMwSm-cwScS2W7IcsQXzrvqYv5OTiCP6pdzkvZxWD3U0/exec";
        const urlParams = new URLSearchParams(window.location.search);
        let currentSN = urlParams.get('sn') || "OXY-12347";
        let manualUrl = ""; let videoUrl = ""; let isStatusOk = true;

        // --- DICTIONNAIRE ---
        const dict = {
            fr: { title: "Concentrateur d'Oxygène", loading: "Recherche...", sn: "Numéro de Série", model: "Modèle", flow: "Débit", install: "Installation", maint: "Maintenance", history: "Historique & Administration", btnDoc: "Manuel PDF", btnVideo: "Tutoriel Vidéo", btnReport: "Signaler un incident", statusOk: "EN SERVICE (CONFORME)", statusWarn: "MAINTENANCE REQUISE", formTitle: "Détail de la panne", send: "Envoyer", cancel: "Annuler", close: "Fermer" },
            en: { title: "Oxygen Concentrator", loading: "Searching...", sn: "Serial Number", model: "Model", flow: "Flow Rate", install: "Installation", maint: "Maintenance", history: "History & Admin", btnDoc: "PDF Manual", btnVideo: "Video Tutorial", btnReport: "Report Incident", statusOk: "IN SERVICE (COMPLIANT)", statusWarn: "MAINTENANCE REQUIRED", formTitle: "Issue Details", send: "Send", cancel: "Cancel", close: "Close" },
            ar: { title: "مُكثّف الأكسجين", loading: "جاري البحث...", sn: "الرقم التسلسلي", model: "الموديل", flow: "معدل التدفق", install: "تاريخ التركيب", maint: "الصيانة القادمة", history: "السجل والإدارة", btnDoc: "الدليل", btnVideo: "فيديو تعليمي", btnReport: "الإبلاغ عن عطل", statusOk: "في الخدمة (مطابق)", statusWarn: "صيانة مطلوبة", formTitle: "تفاصيل العطل", send: "إرسال", cancel: "إلغاء", close: "إغلاق" }
        };
        let currentLang = "fr";

        // --- CHARGEMENT INITIAL ---
        window.onload = function() {
            changeLanguage('fr');
            loadMachineData(currentSN);
        };

        function loadMachineData(sn) {
            document.getElementById('snDisp').innerText = sn;
            // Réinitialise les skeletons
            ['modelDisp', 'flowDisp', 'installDisp', 'maintDisp'].forEach(id => document.getElementById(id).classList.add('skeleton'));

            fetch(`${SCRIPT_URL}?action=get_data&sn=${sn}`)
                .then(r => r.json())
                .then(data => {
                    // Retire les skeletons
                    ['modelDisp', 'flowDisp', 'installDisp', 'maintDisp'].forEach(id => document.getElementById(id).classList.remove('skeleton'));

                    if (data.error) {
                        document.getElementById('statusText').innerText = "Inconnu";
                        document.getElementById('statusDot').style.backgroundColor = "gray";
                        return;
                    }

                    document.getElementById('modelDisp').innerText = data.model || "-";
                    document.getElementById('flowDisp').innerText = data.flow || "-";
                    document.getElementById('installDisp').innerText = data.install_date || "-";
                    document.getElementById('maintDisp').innerText = data.maintenance_date || "-";
                    manualUrl = data.manual_link;
                    videoUrl = data.video_link;

                    // Historique
                    const histBox = document.getElementById('historyList');
                    if(data.history) {
                        histBox.innerHTML = data.history.split(',').map(h => `<div class="history-item">- ${h.trim()}</div>`).join('');
                    } else {
                        histBox.innerHTML = "<div class='history-item'>Aucun historique</div>";
                    }

                    // Calcul Statut
                    if(data.maintenance_date) {
                        isStatusOk = new Date(data.maintenance_date) >= new Date();
                    }
                    updateStatusDisplay();
                })
                .catch(() => {
                    document.getElementById('statusText').innerText = "Erreur réseau";
                });
        }

        // --- FONCTIONS ---
        function manualSearch() {
            const val = document.getElementById('searchInput').value.trim();
            if(val) window.location.href = `?sn=${val}`;
        }

        function unlockTech() {
            if(prompt("Code PIN Technicien (4 chiffres) :") === "1234") {
                document.getElementById('techZone').style.display = 'block';
                document.querySelector('.tech-lock-btn').style.display = 'none';
            }
        }

        function exportInventory() {
            fetch(`${SCRIPT_URL}?action=get_all`)
                .then(r => r.json())
                .then(data => {
                    let csv = "SN,Modele,Debit,Maintenance,Lien\n";
                    data.forEach(m => {
                        csv += `${m.sn},${m.model},${m.flow},${m.maint},${window.location.origin + window.location.pathname + '?sn=' + m.sn}\n`;
                    });
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute("download", "inventaire_vitalaire.csv");
                    link.click();
                });
        }

        function bulkQR() {
            fetch(`${SCRIPT_URL}?action=get_all`)
                .then(r => r.json())
                .then(data => {
                    const win = window.open('', '_blank');
                    win.document.write('<html><head><title>Planche QR Codes</title><style>body{display:flex;flex-wrap:wrap;gap:20px;font-family:sans-serif;padding:20px;}.qr-card{border:1px solid #ccc;padding:15px;text-align:center;width:160px;}</style></head><body>');
                    data.forEach(m => {
                        const qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?sn=' + m.sn)}`;
                        win.document.write(`<div class="qr-card"><img src="${qr}"><br><b>${m.sn}</b><br><small>${m.model}</small></div>`);
                    });
                    win.document.write('</body></html>');
                });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = dict[lang][el.getAttribute('data-i18n')];
            });
            updateStatusDisplay();
        }

        function updateStatusDisplay() {
            const txt = document.getElementById('statusText');
            const dot = document.getElementById('statusDot');
            if(document.getElementById('modelDisp').classList.contains('skeleton')) return;
            
            if(isStatusOk) {
                txt.innerText = dict[currentLang].statusOk;
                txt.style.color = "var(--success)"; dot.style.backgroundColor = "var(--success)";
            } else {
                txt.innerText = dict[currentLang].statusWarn;
                txt.style.color = "var(--danger)"; dot.style.backgroundColor = "var(--danger)";
            }
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function openManual() { if(manualUrl) window.open(manualUrl, '_blank'); else alert("Aucun manuel disponible."); }
        function openVideo() { if(videoUrl) { document.getElementById('videoFrame').src = videoUrl; document.getElementById('videoModal').style.display = 'flex'; } else alert("Aucune vidéo disponible."); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; if(id === 'videoModal') document.getElementById('videoFrame').src = ""; }

        function submitReport() {
            const email = document.getElementById('repEmail').value;
            const msg = document.getElementById('repMsg').value;
            if(!email || !msg) return alert("Veuillez remplir les deux champs.");
            
            fetch(`${SCRIPT_URL}?action=report&sn=${currentSN}&email=${encodeURIComponent(email)}&message=${encodeURIComponent(msg)}`)
                .then(r => r.json())
                .then(() => {
                    alert("Signalement envoyé avec succès !");
                    closeModal('reportModal');
                });
        }
    </script>
</body>
</html>
