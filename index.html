<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargement Manuel d'utilisation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent-blue: #007BFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 50px;
            background-color: var(--bg-color);
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);
            max-width: 500px;
        }

        h1 { color: #31344b; margin-bottom: 20px; }

        /* LE BOUTON - Version haute visibilité */
        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 20px 40px;
            margin-top: 20px;
            background-color: var(--bg-color);
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.5); /* Bordure pour le voir clairement */
            
            /* Effet 3D prononcé */
            box-shadow: 
                9px 9px 16px var(--shadow-dark), 
                -9px -9px 16px var(--shadow-light);
            transition: all 0.2s ease;
        }

        /* Effet au clic (le bouton s'enfonce) */
        .btn-download:active {
            box-shadow: 
                inset 6px 6px 10px var(--shadow-dark), 
                inset -6px -6px 10px var(--shadow-light);
            transform: scale(0.98);
        }

        /* Icône de téléchargement en CSS */
        .icon {
            margin-right: 15px;
            width: 24px;
            height: 24px;
            border-bottom: 3px solid var(--accent-blue);
            position: relative;
        }
        .icon::after {
            content: "↓";
            position: absolute;
            top: -5px;
            left: 5px;
            font-size: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guide Officiel</h1>
        <p>Votre document est prêt pour le téléchargement.</p>

        <a href="https://script.google.com/macros/s/AKfycbzmrvqe6z6NlzXmPgXS1HdFMwSm-cwScS2W7IcsQXzrvqYv5OTiCP6pdzkvZxWD3U0/exec" target="_blank" class="btn-download">
            <div class="icon"></div>
            TÉLÉCHARGER LE MANUEL
        </a>
    </div>

</body>
</html>
